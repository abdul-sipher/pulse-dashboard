<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Pulse — Media Operations</title>
<style>
:root {
  --bg: #0d1117; --bg2: #161b22; --bg3: #1c2128; --bg4: #21262d;
  --border: #30363d; --border2: #3d444d;
  --acc: #2ea043; --acc2: #238636; --accL: rgba(46,160,67,.12);
  --txt: #e6edf3; --txt2: #8b949e; --txt3: #484f58;
  --red: #f85149; --redL: rgba(248,81,73,.12);
  --gold: #d29922; --goldL: rgba(210,153,34,.12);
  --blue: #388bfd; --blueL: rgba(56,139,253,.12);
  --purple: #a371f7; --purpleL: rgba(163,113,247,.12);
  --teal: #2dd4bf; --tealL: rgba(45,212,191,.12);
  --orange: #f0883e; --orangeL: rgba(240,136,62,.12);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--txt);display:flex;height:100vh;overflow:hidden;font-size:14px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* SIDEBAR */
.sidebar{width:232px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sb-logo{padding:18px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--acc),#1a7f37);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.sb-name{font-size:15px;font-weight:700;letter-spacing:-.3px}
.sb-sub{font-size:10px;color:var(--txt2);text-transform:uppercase;letter-spacing:1px}
.sb-nav{padding:10px 6px;flex:1}
.sb-section{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--txt3);padding:10px 8px 4px;margin-top:4px}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:6px;cursor:pointer;color:var(--txt2);font-size:13px;font-weight:500;transition:all .15s;margin-bottom:1px;user-select:none}
.nav-item:hover{background:var(--bg4);color:var(--txt)}
.nav-item.active{background:var(--accL);color:var(--acc)}
.nav-icon{width:17px;text-align:center;font-size:14px}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px}
.nav-badge.green{background:var(--acc2)}
.sb-bottom{padding:12px;border-top:1px solid var(--border)}
.user-pill{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:background .15s}
.user-pill:hover{background:var(--bg4)}
.user-name{font-size:13px;font-weight:600}
.user-role{font-size:11px;color:var(--txt2)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:54px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:10px;flex-shrink:0}
.tb-title{font-size:15px;font-weight:700}
.tb-actions{margin-left:auto;display:flex;align-items:center;gap:8px}
.search{display:flex;align-items:center;gap:7px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:6px 11px;width:220px}
.search input{background:none;border:none;outline:none;color:var(--txt);font-size:13px;width:100%}
.search input::placeholder{color:var(--txt3)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;font-family:inherit}
.btn-p{background:var(--acc2);color:#fff}.btn-p:hover{background:var(--acc)}
.btn-s{background:var(--bg4);color:var(--txt);border:1px solid var(--border)}.btn-s:hover{background:var(--bg3)}
.btn-ic{width:32px;height:32px;padding:0;justify-content:center;background:var(--bg4);border:1px solid var(--border);color:var(--txt2);border-radius:6px;font-size:15px;position:relative}
.btn-ic:hover{color:var(--txt)}
.notif-dot{position:absolute;top:5px;right:5px;width:7px;height:7px;background:var(--red);border-radius:50%;border:2px solid var(--bg2)}

.content{flex:1;overflow-y:auto;padding:22px}

/* CARDS */
.card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:18px}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:13px;font-weight:600}
.card-link{font-size:12px;color:var(--acc);cursor:pointer}
.card-link:hover{text-decoration:underline}

/* TAGS */
.tag{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:500}
.t-podcast{background:var(--purpleL);color:var(--purple)}
.t-video{background:var(--redL);color:var(--red)}
.t-live{background:rgba(248,81,73,.2);color:#ff7b72}
.t-short{background:var(--blueL);color:var(--blue)}
.t-news{background:var(--goldL);color:var(--gold)}
.t-graphic{background:var(--tealL);color:var(--teal)}
.t-quote{background:var(--orangeL);color:var(--orange)}
.t-interview{background:var(--purpleL);color:#c9b1ff}
.t-documentary{background:rgba(248,81,73,.15);color:#ffa198}

/* PRIORITY */
.pri-high{color:var(--red)} .pri-med{color:var(--gold)} .pri-low{color:var(--txt2)}

/* AVATAR */
.av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}

/* STAGE DOT COLORS */
.sd-idea{background:#6e7681} .sd-research{background:var(--blue)} .sd-brief{background:var(--purple)}
.sd-outreach{background:var(--gold)} .sd-confirmed{background:#2dd4bf} .sd-preprod{background:var(--orange)}
.sd-production{background:var(--red)} .sd-postprod{background:#f78166} .sd-review{background:#e3b341}
.sd-scheduled{background:#58a6ff} .sd-published{background:var(--acc)}

/* ── DASHBOARD ── */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:16px}
.stat-lbl{font-size:11px;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;font-weight:500;margin-bottom:7px}
.stat-val{font-size:26px;font-weight:700;margin-bottom:3px}
.stat-chg{font-size:12px;color:var(--txt2)}
.stat-chg.up{color:var(--acc)} .stat-chg.dn{color:var(--red)}

.dash-grid{display:grid;gap:14px;margin-bottom:14px}
.dash-3{grid-template-columns:1fr 1fr 1fr}
.dash-21{grid-template-columns:2fr 1fr}

.pipe-strip{display:flex;margin-bottom:20px;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.ps-stage{flex:1;padding:10px 6px;text-align:center;background:var(--bg3);cursor:pointer;transition:background .15s;border-right:1px solid var(--border)}
.ps-stage:last-child{border-right:none}
.ps-stage:hover{background:var(--bg4)}
.ps-count{font-size:18px;font-weight:700}
.ps-lbl{font-size:9px;color:var(--txt2);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}

.act-item{display:flex;gap:9px;padding:8px 0;border-bottom:1px solid var(--border)}
.act-item:last-child{border-bottom:none}
.act-dot{width:7px;height:7px;border-radius:50%;margin-top:5px;flex-shrink:0}
.act-txt{font-size:13px;color:var(--txt2);line-height:1.5}
.act-txt strong{color:var(--txt)}
.act-time{font-size:11px;color:var(--txt3);margin-top:2px}

.upcoming-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer}
.upcoming-item:last-child{border-bottom:none}
.upcoming-item:hover{opacity:.8}
.up-date{width:40px;text-align:center;flex-shrink:0}
.up-day{font-size:18px;font-weight:700;line-height:1}
.up-month{font-size:10px;color:var(--txt2);text-transform:uppercase}
.up-title{font-size:13px;font-weight:500;flex:1}
.up-meta{font-size:11px;color:var(--txt2)}

/* ── PIPELINE / KANBAN ── */
.pipe-wrap{display:flex;gap:10px;overflow-x:auto;height:calc(100vh - 110px);padding-bottom:12px}
.k-col{flex-shrink:0;width:248px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;display:flex;flex-direction:column;max-height:100%}
.k-hd{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px;flex-shrink:0}
.k-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.k-name{font-size:12px;font-weight:600;flex:1}
.k-cnt{background:var(--bg4);color:var(--txt2);font-size:10px;font-weight:600;padding:1px 6px;border-radius:10px}
.k-cards{overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:7px;flex:1}
.k-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:11px;cursor:grab;transition:all .15s;user-select:none}
.k-card:hover{border-color:var(--acc);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.4)}
.k-card.dragging{opacity:.4;cursor:grabbing}
.k-card.drag-over-target{border-color:var(--acc);background:var(--accL)}
.k-col.drag-over{border-color:var(--acc)}
.k-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:7px}
.k-card-title{font-size:13px;font-weight:600;line-height:1.35;flex:1;margin-right:6px}
.k-card-bot{display:flex;align-items:center;justify-content:space-between;margin-top:9px}
.k-avs{display:flex}
.k-avs .av{width:20px;height:20px;font-size:8px;margin-right:-5px;border:2px solid var(--bg3)}
.k-due{font-size:11px;color:var(--txt3)}
.k-due.overdue{color:var(--red)} .k-due.soon{color:var(--gold)}
.k-plats{display:flex;gap:3px;margin-top:7px;flex-wrap:wrap}
.plat{font-size:10px;padding:1px 5px;border-radius:3px;background:var(--bg4);color:var(--txt3)}
.k-add{margin:6px 8px 8px;padding:7px;border-radius:6px;border:1px dashed var(--border);background:none;color:var(--txt3);font-size:12px;cursor:pointer;width:calc(100% - 16px);text-align:center;transition:all .15s;font-family:inherit}
.k-add:hover{border-color:var(--acc);color:var(--acc)}

/* ── CALENDAR ── */
.cal-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.cal-hd{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.cal-month{font-size:16px;font-weight:700;min-width:150px;text-align:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-dh{padding:9px;text-align:center;font-size:10px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
.cal-day{min-height:90px;padding:7px;border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
.cal-day:nth-child(7n){border-right:none}
.cal-dn{font-size:12px;font-weight:500;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin-bottom:4px}
.cal-dn.today{background:var(--acc2);color:#fff}
.cal-dn.other{color:var(--txt3)}
.cal-ev{padding:2px 5px;border-radius:3px;font-size:10px;font-weight:500;margin-bottom:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ce-live{background:rgba(248,81,73,.2);color:#ff7b72}
.ce-video{background:var(--redL);color:var(--red)}
.ce-podcast{background:var(--purpleL);color:var(--purple)}
.ce-short{background:var(--blueL);color:var(--blue)}
.ce-graphic{background:var(--tealL);color:var(--teal)}
.ce-news{background:var(--goldL);color:var(--gold)}

/* ── GUESTS ── */
.guests-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.g-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:18px;cursor:pointer;transition:all .15s}
.g-card:hover{border-color:var(--acc);transform:translateY(-1px)}
.g-hd{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.g-av{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;flex-shrink:0}
.g-name{font-size:14px;font-weight:600;margin-bottom:1px}
.g-role{font-size:12px;color:var(--txt2)}
.g-status{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:500}
.gs-confirmed{background:var(--accL);color:var(--acc)}
.gs-pending{background:var(--goldL);color:var(--gold)}
.gs-outreach{background:var(--blueL);color:var(--blue)}
.gs-declined{background:var(--redL);color:var(--red)}
.gs-completed{background:var(--bg4);color:var(--txt2)}
.g-row{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--txt2);margin-top:8px}
.g-actions{display:flex;gap:7px;margin-top:14px}

/* ── TEAM ── */
.team-list{display:flex;flex-direction:column;gap:10px}
.tm-row{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:16px 18px;display:flex;align-items:flex-start;gap:16px}
.tm-info{width:160px;flex-shrink:0}
.tm-name{font-size:14px;font-weight:600;margin-bottom:2px}
.tm-role{font-size:12px;color:var(--txt2)}
.tm-tasks{flex:1;display:flex;flex-direction:column;gap:5px}
.t-item{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--bg4);border-radius:6px;font-size:12px}
.t-check{width:16px;height:16px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;transition:all .15s}
.t-check:hover{border-color:var(--acc)}
.t-check.done{background:var(--acc2);border-color:var(--acc2);color:#fff}
.t-item.done .t-lbl{text-decoration:line-through;color:var(--txt3)}
.t-due{margin-left:auto;font-size:11px;color:var(--txt3)}
.t-due.urgent{color:var(--red)}
.wl-bar{height:4px;background:var(--border);border-radius:2px;width:100px;overflow:hidden;margin-top:6px}
.wl-fill{height:100%;border-radius:2px;transition:width .3s}
.wl-ok{background:var(--acc)} .wl-warn{background:var(--gold)} .wl-over{background:var(--red)}
.wl-pct{font-size:11px;color:var(--txt2);margin-top:3px}

/* ── NOTIFICATIONS ── */
.notif-composer{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:18px}
.comp-title{font-size:13px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:7px}
.team-chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px}
.tc{display:flex;align-items:center;gap:5px;padding:4px 9px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--bg4);color:var(--txt2);transition:all .15s}
.tc:hover,.tc.sel{border-color:var(--acc);color:var(--acc);background:var(--accL)}
.tc .av{width:18px;height:18px;font-size:7px}
.notif-list{display:flex;flex-direction:column;gap:8px}
.ni{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:13px 15px;display:flex;gap:11px;align-items:flex-start}
.ni.unread{border-color:var(--acc2);background:var(--accL)}
.ni-ic{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.ni-title{font-size:13px;font-weight:600;margin-bottom:2px}
.ni-body{font-size:13px;color:var(--txt2);line-height:1.5}
.ni-time{font-size:11px;color:var(--txt3);margin-top:3px}

/* ── ANALYTICS ── */
.an-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px}
.mini-chart{height:56px;display:flex;align-items:flex-end;gap:3px;margin-top:10px}
.mb{flex:1;border-radius:2px 2px 0 0;cursor:pointer;transition:background .15s}
.mb:hover{opacity:.8}
.perf-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.perf-lbl{font-size:13px;width:175px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.perf-bar-bg{flex:1;height:7px;background:var(--bg4);border-radius:4px;overflow:hidden}
.perf-bar{height:100%;border-radius:4px}
.perf-val{font-size:12px;color:var(--txt2);width:55px;text-align:right}

/* ── REPURPOSE ── */
.rep-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px}
.rep-card{background:var(--bg4);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center;cursor:pointer;transition:all .15s}
.rep-card:hover{border-color:var(--acc)}
.rep-icon{font-size:24px;margin-bottom:5px}
.rep-lbl{font-size:11px;font-weight:500}
.rep-sub{font-size:10px;color:var(--txt3);margin-top:2px}

/* ── CONTENT LIST ── */
.cl-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer}
.cl-row:last-child{border-bottom:none}
.cl-row:hover{opacity:.8}
.cl-title{font-size:13px;font-weight:500;flex:1}
.cl-meta{font-size:12px;color:var(--txt2)}
.filter-bar{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px}
.fc{padding:5px 11px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--txt2);transition:all .15s}
.fc:hover,.fc.active{background:var(--accL);border-color:var(--acc);color:var(--acc)}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:999;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:26px;width:540px;max-height:82vh;overflow-y:auto;transform:translateY(-8px);transition:transform .2s}
.overlay.open .modal{transform:translateY(0)}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
.modal-title{font-size:17px;font-weight:700}
.modal-close{background:none;border:none;color:var(--txt2);font-size:20px;cursor:pointer;padding:2px 6px;border-radius:4px}
.modal-close:hover{color:var(--txt);background:var(--bg4)}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:12px;font-weight:500;color:var(--txt2);margin-bottom:5px}
.fi,.fs,.fta{width:100%;background:var(--bg4);border:1px solid var(--border);border-radius:6px;padding:8px 11px;color:var(--txt);font-size:13px;outline:none;transition:border-color .15s;font-family:inherit}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--acc)}
.fs option{background:var(--bg3)}
.fta{height:72px;resize:vertical}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-ft{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

/* ── SECTION HEADER ── */
.sec-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px}
.sec-title{font-size:17px;font-weight:700}
.sec-sub{font-size:13px;color:var(--txt2);margin-top:2px}

/* ── CHECKLIST ── */
.checklist{display:flex;flex-direction:column;gap:5px}
.chk-item{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--txt2)}
.chk-item input{accent-color:var(--acc)}

/* DETAIL PANEL */
.detail-panel{position:fixed;top:0;right:-480px;width:480px;height:100vh;background:var(--bg2);border-left:1px solid var(--border);z-index:500;transition:right .25s;overflow-y:auto;padding:24px}
.detail-panel.open{right:0}
.detail-close{float:right;background:none;border:none;color:var(--txt2);font-size:18px;cursor:pointer}
.dp-stage-row{display:flex;gap:5px;flex-wrap:wrap;margin:14px 0}
.dp-stage-btn{padding:4px 10px;border-radius:4px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--bg4);color:var(--txt2);transition:all .15s}
.dp-stage-btn:hover{border-color:var(--acc);color:var(--acc);background:var(--accL)}
.dp-stage-btn.current{border-color:var(--acc2);background:var(--accL);color:var(--acc)}
.progress-bg{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:4px}
.progress-fill{height:100%;border-radius:3px;background:var(--acc);transition:width .3s}

function tagHTML(type){return `<span class="tag ${typeClass[type]||'t-news'}">${typeEmoji[type]||'📄'} ${type}</span>`;}
function av(m,size=''){return `<div class="av" style="background:${m.color};color:#fff;${size?`width:${size}px;height:${size}px;font-size:${Math.round(size*.35)}px`:''}">${m.initials}</div>`;}
function avById(id,size=''){return id!=null&&S.team[id]?av(S.team[id],size):'';}
function fmtDate(d){if(!d)return '';const dt=new Date(d);return dt.toLocaleDateString('en-GB',{day:'numeric',month:'short'});}
function daysTo(d){if(!d)return 999;return Math.ceil((new Date(d)-new Date())/86400000);}
function dueCls(d){const n=daysTo(d);if(n<0)return 'overdue';if(n<=2)return 'soon';return '';}

function stageCount(stageId){return S.content.filter(c=>c.stage===stageId).length;}

// ─── DRAG & DROP ───
function initDragDrop(){
  let dragging=null;
  document.querySelectorAll('.k-card').forEach(card=>{
    card.addEventListener('dragstart',e=>{dragging=card;card.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    card.addEventListener('dragend',()=>{dragging=null;card.classList.remove('dragging');document.querySelectorAll('.k-col').forEach(c=>c.classList.remove('drag-over'));});
  });
  document.querySelectorAll('.k-col').forEach(col=>{
    col.addEventListener('dragover',e=>{e.preventDefault();col.classList.add('drag-over');});
    col.addEventListener('dragleave',()=>col.classList.remove('drag-over'));
    col.addEventListener('drop',e=>{
      e.preventDefault();col.classList.remove('drag-over');
      if(!dragging)return;
      const id=parseInt(dragging.dataset.id);
      const newStage=col.dataset.stage;
      const item=S.content.find(c=>c.id===id);
      if(item&&item.stage!==newStage){const prev=item.stage;item.stage=newStage;triggerWorkflowRules(id,prev,newStage);render();}
    });
  });
}

// ─── CALENDAR ───
function renderCalendar(){
  const y=S.calDate.getFullYear(),m=S.calDate.getMonth();
  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  const monthName=S.calDate.toLocaleString('en-GB',{month:'long',year:'numeric'});
  const today=new Date();

  // Build calendar events
  const calEvents=[];
  S.content.forEach(c=>{
    if(c.publishDate){const d=new Date(c.publishDate);if(d.getMonth()===m&&d.getFullYear()===y)calEvents.push({day:d.getDate(),title:c.title,type:c.type,id:c.id});}
    if(c.dueDate&&c.dueDate!==c.publishDate){const d=new Date(c.dueDate);if(d.getMonth()===m&&d.getFullYear()===y)calEvents.push({day:d.getDate(),title:'📋 '+c.title,type:'brief',id:c.id,isDue:true});}
  });

  let cells='';
  const startDay=first===0?6:first-1;
  for(let i=0;i<startDay;i++){const pd=new Date(y,m,-(startDay-1-i));cells+=`<div class="cal-day"><div class="cal-dn other">${pd.getDate()}</div></div>`;}
  for(let d=1;d<=days;d++){
    const isToday=d===today.getDate()&&m===today.getMonth()&&y===today.getFullYear();
    const evs=calEvents.filter(e=>e.day===d);
    cells+=`<div class="cal-day"><div class="cal-dn${isToday?' today':''}">${d}</div>
      ${evs.map(e=>`<div class="cal-ev ce-${e.isDue?'news':e.type}" onclick="showDetail(${e.id})" title="${e.title}">${e.isDue?'📋 ':''}${e.title}</div>`).join('')}
    </div>`;
  }
  const remaining=(7-((startDay+days)%7))%7;
  for(let i=1;i<=remaining;i++)cells+=`<div class="cal-day"><div class="cal-dn other">${i}</div></div>`;

  return `<div class="cal-wrap">
    <div class="cal-hd">
      <button class="btn btn-s" onclick="changeMonth(-1)">← Prev</button>
      <div class="cal-month">${monthName}</div>
      <button class="btn btn-s" onclick="changeMonth(1)">Next →</button>
      <button class="btn btn-p" style="margin-left:auto" onclick="openModal('add-content')">+ Schedule Content</button>
    </div>
    <div class="cal-grid">
      ${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(d=>`<div class="cal-dh">${d}</div>`).join('')}
      ${cells}
    </div>
  </div>`;
}

function changeMonth(d){S.calDate=new Date(S.calDate.getFullYear(),S.calDate.getMonth()+d,1);render();}

// ─── WHATSAPP + WORKFLOW ENGINE ───
function triggerWorkflowRules(contentId,fromStage,toStage){
  const c=S.content.find(x=>x.id===contentId);
  if(!c)return;
  const matched=S.workflowRules.filter(r=>r.active&&r.fromStage===fromStage&&r.toStage===toStage&&(r.contentTypes.includes('all')||r.contentTypes.includes(c.type)));
  matched.forEach(rule=>{
    const msg=rule.message.replace(/\{\{title\}\}/g,c.title);
    rule.notifyIds.forEach(tid=>{
      const member=S.team[tid];
      if(!member)return;
      sendWhatsAppMessage(tid,msg,c.title,rule.name);
    });
    S.notifications.unshift({id:Date.now()+Math.random(),read:false,type:'task',icon:'⚙️',title:`Auto: ${rule.name}`,body:`Triggered for "${c.title}" · WhatsApp sent to ${rule.notifyIds.map(i=>S.team[i]?.name.split(' ')[0]).join(', ')}`,time:'Just now',target:rule.notifyIds.map(i=>S.team[i]?.name).filter(Boolean)});
  });
  if(matched.length)showToast(`⚙️ ${matched.length} workflow rule${matched.length>1?'s':''} fired — WhatsApp sent`);
}

function sendWhatsAppMessage(teamId,message,contentTitle,ruleName){
  const m=S.team[teamId];
  if(!m)return;
  const log={id:Date.now()+Math.random(),to:m.name,phone:m.phone||'not set',message,contentTitle,ruleName,time:new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}),status:m.phone&&m.waKey?'sent':'no_creds'};
  S.waLog.unshift(log);
  if(m.phone&&m.waKey){
    const encoded=encodeURIComponent(message);
    fetch(`https://api.callmebot.com/whatsapp.php?phone=${m.phone}&text=${encoded}&apikey=${m.waKey}`,{mode:'no-cors'}).catch(()=>{});
  }
}

          <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--txt2);margin-bottom:10px;flex-wrap:wrap">
            <span style="background:var(--bg4);padding:2px 8px;border-radius:4px">${stages.find(s=>s.id===r.fromStage)?.label||r.fromStage}</span>
            <span style="color:var(--acc)">→</span>
            <span style="background:var(--bg4);padding:2px 8px;border-radius:4px">${stages.find(s=>s.id===r.toStage)?.label||r.toStage}</span>
            <span style="color:var(--txt3)">·</span>
            <span>Notify: <strong style="color:var(--txt)">${r.notifyIds.map(i=>S.team[i]?.name.split(' ')[0]).filter(Boolean).join(', ')}</strong></span>
            <span style="color:var(--txt3)">·</span>
            <span>Content: <strong style="color:var(--txt)">${r.contentTypes.includes('all')?'All types':r.contentTypes.join(', ')}</strong></span>
          </div>
          <div style="background:var(--bg4);border-radius:6px;padding:10px 12px;font-size:12px;color:var(--txt2);line-height:1.6;font-family:monospace;white-space:pre-wrap">${r.message}</div>
        </div>
        <div style="display:flex;gap:6px;flex-shrink:0">
          <button class="btn btn-s" style="font-size:12px;padding:5px 10px" onclick="openModal('edit-rule',${ri})">✏️</button>
          <button class="btn btn-s" style="font-size:12px;padding:5px 10px;color:var(--red)" onclick="deleteRule(${ri})">🗑</button>
        </div>
      </div>
    </div>`).join('')}
  </div>

  <div class="card">
    <div class="card-hd"><div class="card-title">📨 WhatsApp Send Log</div><button class="btn btn-s" style="font-size:12px" onclick="S.waLog=[];render()">Clear</button></div>
    ${S.waLog.length===0?'<div style="color:var(--txt2);font-size:13px;padding:8px 0">No messages sent yet. Move a content card to trigger a rule.</div>':
    S.waLog.slice(0,20).map(l=>`
    <div style="display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)">
      <div style="font-size:18px">${l.status==='sent'?'✅':'⚠️'}</div>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:500">${l.to} <span style="color:var(--txt3);font-weight:400">· ${l.phone}</span></div>
        <div style="font-size:12px;color:var(--txt2)">Rule: ${l.ruleName} · Content: ${l.contentTitle}</div>
        ${l.status==='no_creds'?'<div style="font-size:11px;color:var(--gold);margin-top:2px">⚠️ No phone/API key set — message not sent. Add in WhatsApp Setup.</div>':''}
      </div>
      <div style="font-size:11px;color:var(--txt3)">${l.time}</div>
    </div>`).join('')}
  </div>`;
}

function toggleRule(ri){S.workflowRules[ri].active=!S.workflowRules[ri].active;render();}
function deleteRule(ri){if(confirm('Delete this rule?')){S.workflowRules.splice(ri,1);render();}}

// ─── RENDER SETTINGS ───
function renderSettings(){
  return `
  <div class="sec-hd">
    <div><div class="sec-title">WhatsApp Setup 📱</div><div class="sec-sub">Add each team member's number and CallMeBot API key to enable automatic WhatsApp messages</div></div>
  </div>

  <div class="card" style="margin-bottom:18px">
    <div class="card-hd"><div class="card-title">📋 Setup Guide — 3 steps per person (takes 60 seconds)</div></div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
      ${[['1','Save the CallMeBot number','Add <strong>+34 644 83 07 37</strong> to your WhatsApp contacts (save it as "CallMeBot" or anything)'],['2','Send the activation message','Open WhatsApp, message that number exactly: <strong style="font-family:monospace">I allow callmebot to send me messages</strong>'],['3','Receive your API key','Within seconds you\'ll get a reply with your personal API key. Paste it below along with your number (include country code, no spaces e.g. +447911123456)']].map(([n,title,body])=>`
      <div style="background:var(--bg4);border-radius:8px;padding:14px">
        <div style="width:24px;height:24px;background:var(--acc2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;margin-bottom:8px">${n}</div>
        <div style="font-size:13px;font-weight:600;margin-bottom:4px">${title}</div>
        <div style="font-size:12px;color:var(--txt2);line-height:1.5">${body}</div>
      </div>`).join('')}
    </div>
    <div style="margin-top:12px;padding:10px 14px;background:var(--goldL);border:1px solid var(--gold);border-radius:6px;font-size:12px;color:var(--txt2)">
      ⚠️ <strong style="color:var(--gold)">Free tier:</strong> CallMeBot is free. Each person only needs to do this setup once. Messages are sent from CallMeBot's number but contain your full custom message.
    </div>
  </div>

  <div class="card">
    <div class="card-hd"><div class="card-title">👥 Team WhatsApp Credentials</div></div>
    <div style="display:flex;flex-direction:column;gap:0">
      ${S.team.map((m,i)=>`
      <div style="display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--border)">
        ${av(m,36)}
        <div style="width:160px;flex-shrink:0">
          <div style="font-size:13px;font-weight:600">${m.name}</div>
          <div style="font-size:11px;color:var(--txt2)">${m.role}</div>
        </div>
        <input class="fi" placeholder="+447911123456" value="${m.phone}" oninput="S.team[${i}].phone=this.value" style="flex:1;max-width:180px">
        <input class="fi" placeholder="CallMeBot API key" value="${m.waKey}" oninput="S.team[${i}].waKey=this.value" style="flex:1;max-width:180px">
        <button class="btn btn-s" style="font-size:12px;flex-shrink:0" onclick="testWhatsApp(${i})">📲 Test</button>
        <div style="width:80px;text-align:right;font-size:11px;flex-shrink:0;color:${m.phone&&m.waKey?'var(--acc)':'var(--txt3)'}">
          ${m.phone&&m.waKey?'✅ Ready':'⚪ Not set'}
        </div>
      </div>`).join('')}
    </div>
    <div style="margin-top:16px;display:flex;justify-content:flex-end">
      <button class="btn btn-p" onclick="saveWASettings()">💾 Save Settings</button>
    </div>
  </div>`;
}

function testWhatsApp(i){
  const m=S.team[i];
  if(!m.phone||!m.waKey){showToast('⚠️ Enter phone number and API key first');return;}
  const msg=encodeURIComponent(`👋 Hi ${m.name.split(' ')[0]}! This is a test message from The Pulse dashboard. Your WhatsApp notifications are working correctly ✅`);
  fetch(`https://api.callmebot.com/whatsapp.php?phone=${m.phone}&text=${msg}&apikey=${m.waKey}`,{mode:'no-cors'}).catch(()=>{});
  showToast(`📲 Test message sent to ${m.name.split(' ')[0]} — check their WhatsApp`);
}

function saveWASettings(){showToast('✅ WhatsApp settings saved');}

// ─── RULE MODAL (wired into openModal below) ───
function openRuleModal(ri){
  const r=ri!=null?S.workflowRules[ri]:null;
  const overlay=document.getElementById('modal-overlay');
  document.getElementById('modal-body').innerHTML=`
  <div class="modal-hd"><div class="modal-title">${r?'✏️ Edit Rule':'+ New Workflow Rule'}</div><button class="modal-close" onclick="closeModal()">✕</button></div>
  <div class="fg"><label>Rule Name</label><input class="fi" id="r-name" value="${r?.name||''}" placeholder="e.g. Edit Done → Director Review"></div>
  <div class="f-row">
    <div class="fg"><label>When stage changes FROM</label><select class="fs" id="r-from">
      ${stages.map(s=>`<option value="${s.id}" ${r?.fromStage===s.id?'selected':''}>${s.label}</option>`).join('')}
    </select></div>
    <div class="fg"><label>TO this stage</label><select class="fs" id="r-to">
      ${stages.map(s=>`<option value="${s.id}" ${r?.toStage===s.id?'selected':''}>${s.label}</option>`).join('')}
    </select></div>
  </div>
  <div class="fg"><label>Notify these team members (hold Ctrl/Cmd for multiple)</label>
    <select class="fs" id="r-notify" multiple style="height:120px">
      ${S.team.map((m,i)=>`<option value="${i}" ${r?.notifyIds.includes(i)?'selected':''}>${m.name} — ${m.role}</option>`).join('')}
    </select>
  </div>
  <div class="fg"><label>Only for these content types (hold Ctrl/Cmd for multiple; select "All" for everything)</label>
    <select class="fs" id="r-types" multiple style="height:100px">
      <option value="all" ${r?.contentTypes.includes('all')?'selected':''}>All types</option>
      ${Object.keys(typeEmoji).map(t=>`<option value="${t}" ${r?.contentTypes.includes(t)?'selected':''}>${typeEmoji[t]} ${t}</option>`).join('')}
    </select>
  </div>
  <div class="fg"><label>WhatsApp Message (use {{title}} for the content name)</label>
    <textarea class="fta" id="r-msg" style="height:110px;font-family:monospace">${r?.message||''}</textarea>
  </div>
  <div class="modal-ft">
    <button class="btn btn-s" onclick="closeModal()">Cancel</button>
    <button class="btn btn-p" onclick="submitRule(${ri??'null'})">Save Rule →</button>
  </div>`;
  overlay.classList.add('open');
}

function submitRule(ri){
  const name=document.getElementById('r-name').value.trim();
  if(!name){showToast('⚠️ Rule name required');return;}
  const notifyIds=[...document.getElementById('r-notify').selectedOptions].map(o=>parseInt(o.value));
  const rawTypes=[...document.getElementById('r-types').selectedOptions].map(o=>o.value);
  const contentTypes=rawTypes.includes('all')?['all']:rawTypes;
  const rule={id:ri!=null?S.workflowRules[ri].id:Date.now(),active:true,name,fromStage:document.getElementById('r-from').value,toStage:document.getElementById('r-to').value,notifyIds,contentTypes,message:document.getElementById('r-msg').value};
  if(ri!=null)S.workflowRules[ri]=rule;else S.workflowRules.push(rule);
  closeModal();showToast('✅ Rule saved');render();
}
// ─── END RULE MODAL ───

// ─── MODALS ───
function openModal(type,arg1,arg2){
  const overlay=document.getElementById('modal-overlay');
  const body=document.getElementById('modal-body');
  if(type==='add-content'||type==='quick-add'){
    body.innerHTML=`
    <div class="modal-hd"><div class="modal-title">+ New Content</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="fg"><label>Title *</label><input class="fi" id="m-title" placeholder="Content title…"></div>
    <div class="f-row">
      <div class="fg"><label>Type *</label><select class="fs" id="m-type">
        ${Object.keys(typeEmoji).map(t=>`<option value="${t}">${typeEmoji[t]} ${t.charAt(0).toUpperCase()+t.slice(1)}</option>`).join('')}
      </select></div>
      <div class="fg"><label>Stage</label><select class="fs" id="m-stage">
        ${stages.map(s=>`<option value="${s.id}" ${arg1===s.id?'selected':''}>${s.label}</option>`).join('')}
      </select></div>
    </div>
    <div class="f-row">
      <div class="fg"><label>Priority</label><select class="fs" id="m-pri"><option value="high">🔴 High</option><option value="med" selected>🟡 Medium</option><option value="low">⚪ Low</option></select></div>
      <div class="fg"><label>Platforms</label><input class="fi" id="m-plat" placeholder="YouTube, Instagram…" value="YouTube"></div>
    </div>
    <div class="f-row">
      <div class="fg"><label>Due Date</label><input class="fi" id="m-due" type="date"></div>
      <div class="fg"><label>Publish Date</label><input class="fi" id="m-pub" type="date"></div>
    </div>
    <div class="fg"><label>Assign To</label><select class="fs" id="m-assign">
      ${S.team.map((m,i)=>`<option value="${i}">${m.name}</option>`).join('')}
    </select></div>
    <div class="fg"><label>Description</label><textarea class="fta" id="m-desc" placeholder="Brief description…"></textarea></div>
    <div class="modal-ft"><button class="btn btn-s" onclick="closeModal()">Cancel</button><button class="btn btn-p" onclick="submitContent()">Create Content →</button></div>`;
  } else if(type==='add-guest'){
    body.innerHTML=`
    <div class="modal-hd"><div class="modal-title">🎤 Add Guest</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="f-row">
      <div class="fg"><label>Full Name *</label><input class="fi" id="g-name" placeholder="Guest name…"></div>
      <div class="fg"><label>Role / Title</label><input class="fi" id="g-role" placeholder="Scholar, Journalist…"></div>
    </div>
    <div class="f-row">
      <div class="fg"><label>Email</label><input class="fi" id="g-email" type="email" placeholder="email@example.com"></div>
      <div class="fg"><label>Status</label><select class="fs" id="g-status"><option value="outreach">Outreach Sent</option><option value="pending">Pending Reply</option><option value="confirmed">Confirmed</option></select></div>
    </div>
    <div class="fg"><label>Topic / Episode</label><input class="fi" id="g-topic" placeholder="Proposed topic…"></div>
    <div class="fg"><label>Expertise Areas</label><input class="fi" id="g-exp" placeholder="Theology, Politics…"></div>
    <div class="fg"><label>Notes</label><textarea class="fta" id="g-notes" placeholder="Any notes on this guest…"></textarea></div>
    <div class="modal-ft"><button class="btn btn-s" onclick="closeModal()">Cancel</button><button class="btn btn-p" onclick="submitGuest()">Add Guest →</button></div>`;
  } else if(type==='add-rule'){
    openRuleModal(null); return;
  } else if(type==='edit-rule'){
    openRuleModal(parseInt(arg1)); return;
  } else if(type==='send-notif'||type==='send-task'){
    body.innerHTML=`
    <div class="modal-hd"><div class="modal-title">📣 ${type==='send-task'?'Assign Task':'Send Notification'}</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="fg"><label>Recipient</label><select class="fs" id="sn-to">
      <option value="All Team">All Team</option>
      ${S.team.map(m=>`<option value="${m.name}" ${m.name===arg1?'selected':''}>${m.name}</option>`).join('')}
    </select></div>
    <div class="fg"><label>Title *</label><input class="fi" id="sn-title" placeholder="${type==='send-task'?'Task name…':'Notification title…'}"></div>
    <div class="fg"><label>Message</label><textarea class="fta" id="sn-body" placeholder="Details…"></textarea></div>
    <div class="fg"><label>Type</label><select class="fs" id="sn-type"><option value="task">📋 Task</option><option value="deadline">⏰ Deadline</option><option value="review">👁 Review</option><option value="publish">🚀 Publish</option></select></div>
    <div class="modal-ft"><button class="btn btn-s" onclick="closeModal()">Cancel</button><button class="btn btn-p" onclick="quickSendNotif()">Send →</button></div>`;
  }
  overlay.classList.add('open');
}

function submitContent(){
  const title=document.getElementById('m-title').value.trim();
  if(!title){showToast('⚠️ Title is required');return;}
  S.content.push({id:Date.now(),title,type:document.getElementById('m-type').value,stage:document.getElementById('m-stage').value,priority:document.getElementById('m-pri').value,platforms:document.getElementById('m-plat').value.split(',').map(p=>p.trim()).filter(Boolean)||['YouTube'],assignedTo:[parseInt(document.getElementById('m-assign').value)],dueDate:document.getElementById('m-due').value,publishDate:document.getElementById('m-pub').value,description:document.getElementById('m-desc').value,tags:[],checklist:[{t:'Draft brief',d:false},{t:'Assign team',d:false},{t:'Production',d:false},{t:'Edit & review',d:false},{t:'Publish',d:false}]});
  closeModal();showToast('✅ Content created and added to pipeline');render();
}

function submitGuest(){
  const name=document.getElementById('g-name').value.trim();
  if(!name){showToast('⚠️ Name is required');return;}
  const colors=[['#1a7f37','#fff'],['#388bfd','#fff'],['#a371f7','#fff'],['#d29922','#fff'],['#2dd4bf','#fff'],['#f0883e','#fff'],['#f85149','#fff']][Math.floor(Math.random()*7)];
  S.guests.push({id:S.guests.length,name,role:document.getElementById('g-role').value,expertise:document.getElementById('g-exp').value,status:document.getElementById('g-status').value,email:document.getElementById('g-email').value,outreach:1,lastContact:new Date().toISOString().slice(0,10),scheduledDate:'',notes:document.getElementById('g-notes').value,colors,topic:document.getElementById('g-topic').value});
  closeModal();showToast('✅ Guest added');render();
}

function quickSendNotif(){
  const title=document.getElementById('sn-title')?.value;
  const body=document.getElementById('sn-body')?.value||'';
  if(!title){showToast('⚠️ Title required');return;}
  const to=document.getElementById('sn-to')?.value||'All Team';
  const icons={task:'📋',deadline:'⏰',review:'👁',publish:'🚀',guest:'🎤'};
  const type=document.getElementById('sn-type')?.value||'task';
  S.notifications.unshift({id:Date.now(),read:false,type,icon:icons[type]||'📣',title,body,time:'Just now',target:[to]});
  closeModal();showToast(`✅ Sent to ${to}`);
}

function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
function closeModalOutside(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}

// ─── TOAST ───
function showToast(msg){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:10px 18px;font-size:13px;font-weight:500;z-index:9999;transition:opacity .3s;box-shadow:0 8px 24px rgba(0,0,0,.4)';document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity='1';
  clearTimeout(t._timer);t._timer=setTimeout(()=>{t.style.opacity='0';},2800);
}

// ─── EVENT DELEGATION ───
document.querySelectorAll('.nav-item[data-view]').forEach(el=>{
  el.addEventListener('click',()=>navigate(el.dataset.view));
});
document.getElementById('global-search').addEventListener('input',e=>{
  const q=e.target.value.toLowerCase();
  if(!q)return;
  const match=S.content.find(c=>c.title.toLowerCase().includes(q));
  if(match)showDetail(match.id);
});

// ─── INIT ───
render();
</script>
</body>
</html>
